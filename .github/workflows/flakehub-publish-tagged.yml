name: "Publish tags to FlakeHub"
on:
  push:
    tags:
      - "v?[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "The existing tag to publish to FlakeHub"
        type: "string"
        required: true
jobs:
  flakehub-publish:
    runs-on: "ubuntu-latest"
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: "actions/checkout@v6"
        with:
          ref: "${{ (inputs.tag != null) && format('refs/tags/{0}', inputs.tag) || '' }}"
      - uses: "DeterminateSystems/determinate-nix-action@v3"
      - id: "flakehub_push"
        continue-on-error: true
        uses: "DeterminateSystems/flakehub-push@v6"
        with:
          visibility: "public"
          name: "taffybar/taffybar"
          tag: "${{ inputs.tag || github.ref_name }}"
          # Our flake exposes multiple systems and uses IFD-backed Haskell
          # packaging, which makes flake inventory evaluation fail in this
          # publish job. Skip inventory collection but still publish releases.
          my-flake-is-too-big: true
      - name: "Report skipped FlakeHub publish"
        if: "${{ steps.flakehub_push.outcome == 'failure' }}"
        run: |
          {
            echo "## FlakeHub publish skipped"
            echo
            echo "The release tag was created, but FlakeHub publish failed."
            echo "This job is non-blocking because FlakeHub authentication depends on external organization setup."
            echo "Re-run this workflow manually after FlakeHub authentication is available."
          } >> "$GITHUB_STEP_SUMMARY"
